    notes: "CLOSED 2026-07-06 (REQ-M12-005, coordinator auto-close per DEC-0003 grant), git tag v1.0.12. Z80A CPU parity hardening. QA PASS (docs/m12-qa-signoff.md): QA-executed ctest 45/45 (+7 suites), zero regression M1-M12 (8 M11 timing oracles unchanged; no T-state/refresh site altered; IM1 ack=14 no double-count). Gaps closed: #3/#35 WZ, #4/#5 BIT-from-WZ, #20/#21 SCF/CCF Q-latch, #30 RETI IFF, #31 NMOS LD A,I/R bug. #34 HALT-R deferred (DEC-0004). A/B empty diff 48/48 vs openMSX 19.1 QA-reproduced + adversarial corruption test. Residuals non-blocking: ZEXALL offline-degraded (acceptance made it 'if feasible'); HALT-R defer. Forward follow-ups: DEC-0004 HALT-R; stand up ZEX if a legal binary appears."
