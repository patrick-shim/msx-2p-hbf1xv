      unit_tests_added_or_updated: false
      integration_tests_added_or_updated: false
      build_flow_referenced: true
    regression_qa:
      regression_matrix_updated: false
      impacted_areas_covered: false
      blocker_risks_resolved_or_accepted: false
      signoff_decision_recorded: false
    overall_done: false
