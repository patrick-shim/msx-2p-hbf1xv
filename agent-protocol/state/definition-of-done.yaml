    notes: "CLOSED 2026-07-06 (DEC-0006 / REQ-M13-005), git tag v1.0.13. QA PASS (REQ-M13-004, docs/m13-qa-signoff.md). RAM/ROM devices + slot population per Sony_HB-F1XV.xml (slot 0-0 BIOS, 3-0 RAM mapper, 3-1 SUB+Kanji, 3-2 DISK, 3-3 FM-MUSIC; slots 0 & 3 expanded). Machine now BOOTS real BIOS (#A8=0, bus[0]=0xF3 DI, PC advances through BIOS). ctest 50/50 (QA-executed, +5), zero regression (updated tests authentic not weakened; single #FC-FF owner; ram_slot_backing retired). BIOS SHA1s match openMSX 'confirmed by Meits'; both A/B subjects empty diff, QA-reproduced with comparator failure-mode checks. Deferred out-of-scope (tracked): FM-PAC internals+SRAM, Kanji-font I/O #D8-DB, Halnote/MSX-JE firmware, cartridge loading, FDC drive mechanics, VRAM/VDP (M14). Awaiting human release decision + tag v1.0.13."
