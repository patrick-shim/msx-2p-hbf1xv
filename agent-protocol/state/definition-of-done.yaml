version: 1
schema: msx-agent-dod
applies_to: all_milestones
enforcement: required

checklist:
  planning:
    spec_defined: false
    scope_in_scope_only: false
    dependencies_mapped: false
    acceptance_criteria_defined: false
    risks_logged: false
    evidence:
      required_files:
        - agent-protocol/state/milestones.md
        - agent-protocol/channels/requests.md
        - agent-protocol/channels/responses.md
  implementation:
    code_changes_scoped_to_milestone: false
    unit_tests_added_or_updated: false
    integration_tests_added_or_updated: false
    build_flow_referenced: false
    evidence:
      required_artifacts:
        - changed_source_files
        - unit_test_report
        - integration_test_report
  regression_qa:
    regression_matrix_updated: false
    impacted_areas_covered: false
    blocker_risks_resolved_or_accepted: false
    signoff_decision_recorded: false
    evidence:
      required_files:
        - agent-protocol/channels/responses.md
        - agent-protocol/channels/decisions.md

phase_transition_rules:
  planning_to_implementation:
    requires:
      - checklist.planning.spec_defined
      - checklist.planning.acceptance_criteria_defined
      - checklist.planning.risks_logged
  implementation_to_regression_qa:
    requires:
      - checklist.implementation.unit_tests_added_or_updated
      - checklist.implementation.integration_tests_added_or_updated
  regression_qa_to_release_decision:
    requires:
      - checklist.regression_qa.regression_matrix_updated
      - checklist.regression_qa.signoff_decision_recorded

